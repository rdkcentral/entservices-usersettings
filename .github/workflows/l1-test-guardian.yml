name: l1-test-guardian

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop, 'sprint/**', 'release/**']
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  evaluate-and-enqueue:
    name: Detect missing L1 tests and enqueue Copilot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate change set
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          # Prevent self-trigger loops on Copilot-generated L1 maintenance PRs.
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$PR_TITLE" =~ ^L1: ]] || [[ "${PR_AUTHOR,,}" == *"copilot"* ]]; then
              echo "needs_agent=false" >> "$GITHUB_OUTPUT"
              echo "reason=Skipped automation PR to avoid recursive agent loop (author=$PR_AUTHOR, title=$PR_TITLE)" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          tmp_files="$(mktemp)"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' > "$tmp_files"
            scope_label="PR #$PR_NUMBER"
          else
            git fetch origin "$DEFAULT_BRANCH" --depth=200
            git log --since='24 hours ago' --name-only --pretty=format: "origin/$DEFAULT_BRANCH" \
              | sed '/^$/d' \
              | sort -u > "$tmp_files"
            scope_label="default branch commits in last 24h"
          fi

          total_changed="$(wc -l < "$tmp_files" | tr -d ' ')"
          if [[ "$total_changed" -eq 0 ]]; then
            echo "needs_agent=false" >> "$GITHUB_OUTPUT"
            echo "reason=No file changes detected for evaluation scope" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source_regex='\\.(c|cc|cpp|cxx|h|hh|hpp)$'
          ignored_regex='(^|/)Tests/|(^|/)docs?/|(^|/)\.github/|(^|/)cmake/'
          l1_regex='(^|/)Tests/L1Tests/|(^|/)L1[-_].*tests?\.(c|cc|cpp|cxx|h|hh|hpp)$|(^|/)tests?/.*l1.*\.(c|cc|cpp|cxx|h|hh|hpp)$'

          src_changed=false
          l1_changed=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ $source_regex ]] && [[ ! "$file" =~ $ignored_regex ]]; then
              src_changed=true
            fi

            if [[ "$file" =~ $l1_regex ]]; then
              l1_changed=true
            fi
          done < "$tmp_files"

          if [[ "$src_changed" == "true" && "$l1_changed" == "false" ]]; then
            echo "needs_agent=true" >> "$GITHUB_OUTPUT"
            echo "reason=Source changes without L1 test updates in $scope_label" >> "$GITHUB_OUTPUT"
          else
            echo "needs_agent=false" >> "$GITHUB_OUTPUT"
            echo "reason=No missing-L1 signal in $scope_label (src_changed=$src_changed, l1_changed=$l1_changed)" >> "$GITHUB_OUTPUT"
          fi

      - name: Show decision
        run: |
          echo "needs_agent=${{ steps.evaluate.outputs.needs_agent }}"
          echo "reason=${{ steps.evaluate.outputs.reason }}"

      - name: Find duplicate open issue
        if: steps.evaluate.outputs.needs_agent == 'true'
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            key="PR #$PR_NUMBER"
          else
            key="daily scan"
          fi

          existing="$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "[L1-Guardian] in:title $key" \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing" ]]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$existing" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Copilot issue to run custom agent
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            title="[L1-Guardian] Generate missing L1 tests for PR #$PR_NUMBER"
            subject="PR #$PR_NUMBER"
            subject_details="PR title: $PR_TITLE\nHead SHA: $PR_HEAD_SHA"
          else
            title="[L1-Guardian] Daily scan detected source changes without L1 test updates"
            subject="daily scan"
            subject_details="Scope: commits on default branch in the last 24 hours"
          fi

          body_file="$(mktemp)"
          {
            printf '%s\n' "@copilot"
            printf '\n'
            printf '%s\n' "/agent l1-test-guardian"
            printf '\n'
            printf 'Please run the l1-test-guardian workflow for %s.\n\n' "${subject}"
            printf '%s\n\n' "${subject_details}"
            printf 'Required behavior:\n'
            printf '1. Analyze changed source files and existing L1 tests.\n'
            printf '2. If L1 tests are already sufficient, comment findings and stop.\n'
            printf '3. If L1 tests are missing, generate/update tests and open a separate PR.\n'
            printf '4. Run CI for that PR and iteratively fix failures until required checks pass.\n'
            printf '5. Keep production-code changes minimal and justified.\n\n'
            printf 'Prompt-mix guidance to apply:\n'
            printf '%s\n' "- basic API tests"
            printf '%s\n' "- helper/private method tests"
            printf '%s\n' "- negative-case tests"
            printf '%s\n' "- notification handler + notification tests"
            printf '%s\n' "- refactor pass after coverage is in place"
          } > "$body_file"

          issue_url="$(gh issue create \
            --repo "$REPO" \
            --title "$title" \
            --body-file "$body_file")"

          echo "Created issue: $issue_url"

      - name: Skip because issue already exists
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate == 'true'
        run: |
          echo "Skipped creating a new issue; existing issue #${{ steps.dedupe.outputs.issue_number }} is already open."