name: l2-test-guardian

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop, 'sprint/**', 'release/**']
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  evaluate-and-enqueue:
    name: Detect missing L2 tests and enqueue Copilot
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' ||
      (github.actor != 'dependabot[bot]' &&
       github.actor != 'copilot[bot]' &&
       !contains(github.event.pull_request.user.login, 'copilot') &&
       !startsWith(github.event.pull_request.title, 'L2: '))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Evaluate change set
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          # Prevent self-trigger loops on Copilot-generated L2 maintenance PRs.
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$PR_TITLE" =~ ^L2: ]] || [[ "${PR_AUTHOR,,}" == *"copilot"* ]]; then
              echo "needs_agent=false" >> "$GITHUB_OUTPUT"
              echo "reason=Skipped automation PR to avoid recursive agent loop (author=$PR_AUTHOR, title=$PR_TITLE)" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          tmp_files="$(mktemp)"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' > "$tmp_files"
            scope_label="PR #$PR_NUMBER"
          else
            git fetch origin "$DEFAULT_BRANCH" --depth=200
            git log --since='24 hours ago' --name-only --pretty=format: "origin/$DEFAULT_BRANCH" \
              | sed '/^$/d' \
              | sort -u > "$tmp_files"
            scope_label="default branch commits in last 24h"
          fi

          total_changed="$(wc -l < "$tmp_files" | tr -d ' ')"
          if [[ "$total_changed" -eq 0 ]]; then
            echo "needs_agent=false" >> "$GITHUB_OUTPUT"
            echo "reason=No file changes detected for evaluation scope" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source_regex='\.(c|cc|cpp|cxx|h|hh|hpp)$'
          ignored_regex='(^|/)Tests/|(^|/)docs?/|(^|/)\.github/|(^|/)cmake/'
          l2_regex='(^|/)Tests/L2Tests/|(^|/)L2[-_].*tests?\.(c|cc|cpp|cxx|h|hh|hpp)$|(^|/)tests?/.*l2.*\.(c|cc|cpp|cxx|h|hh|hpp)$'

          src_changed=false
          l2_changed=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ $source_regex ]] && [[ ! "$file" =~ $ignored_regex ]]; then
              src_changed=true
            fi

            if [[ "$file" =~ $l2_regex ]]; then
              l2_changed=true
            fi
          done < "$tmp_files"

          if [[ "$src_changed" == "true" && "$l2_changed" == "false" ]]; then
            echo "needs_agent=true" >> "$GITHUB_OUTPUT"
            echo "reason=Source changes without L2 test updates in $scope_label" >> "$GITHUB_OUTPUT"
          else
            echo "needs_agent=false" >> "$GITHUB_OUTPUT"
            echo "reason=No missing-L2 signal in $scope_label (src_changed=$src_changed, l2_changed=$l2_changed)" >> "$GITHUB_OUTPUT"
          fi

      - name: Show decision
        run: |
          echo "needs_agent=${{ steps.evaluate.outputs.needs_agent }}"
          echo "reason=${{ steps.evaluate.outputs.reason }}"

      - name: Find duplicate open issue
        if: steps.evaluate.outputs.needs_agent == 'true'
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            key="PR #$PR_NUMBER"
          else
            key="daily scan"
          fi

          existing="$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "[L2-Guardian] in:title $key" \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing" ]]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$existing" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve prompts and build issue body
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate != 'true'
        id: resolve_prompts
        env:
          GH_TOKEN: ${{ secrets.PROMPT_PAT }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PYEOF'
          import base64
          import os
          import subprocess
          import tempfile
          import yaml

          event_name = os.environ.get("EVENT_NAME", "")
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_title = os.environ.get("PR_TITLE", "")
          pr_head_sha = os.environ.get("PR_HEAD_SHA", "")

          if event_name == "pull_request":
              title = f"[L2-Guardian] Generate missing L2 tests for PR #{pr_number}"
              subject = f"PR #{pr_number}"
              subject_details = f"PR title: {pr_title}\nHead SHA: {pr_head_sha}"
          else:
              title = "[L2-Guardian] Daily scan detected source changes without L2 test updates"
              subject = "daily scan"
              subject_details = "Scope: commits on default branch in the last 24 hours"

          prompts = {
              "l2_basic": "RDK/entservices/L2-plugin-testing/prompts/generate-l2-basic-tests-jsonrpc-comrpc.yml",
              "l2_notification": "RDK/entservices/L2-plugin-testing/prompts/generate-l2-notification-handler-tests.yml",
              "l2_fixture": "RDK/entservices/L2-plugin-testing/prompts/generate-l2-a-test-fixture.yml",
          }

          prompt_text = {}
          for key, path in prompts.items():
              try:
                  endpoint = f"repos/rdk-e/rdke_mw_prompt_lib/contents/{path}"
                  result = subprocess.run(
                      ["gh", "api", endpoint, "--jq", ".content"],
                      capture_output=True,
                      text=True,
                      check=True,
                  )

                  yaml_content = base64.b64decode(result.stdout.strip().strip('"\n')).decode("utf-8")
                  data = yaml.safe_load(yaml_content)
                  prompt_text[key] = data["promptDefinition"]["prompt"].strip()
              except Exception as e:
                  raise RuntimeError(
                      f"Failed to fetch prompt library file '{path}' using GH_TOKEN from secrets.PROMPT_PAT. "
                      f"Ensure PROMPT_PAT is set and has read access to rdk-e/rdke_mw_prompt_lib. "
                      f"Underlying error: {e}"
                  )

          lines = [
              "@copilot",
              "",
              "/agent l2-test-guardian",
              "",
              f"Please run the l2-test-guardian workflow for {subject}.",
              "",
              subject_details,
              "",
              "Required behavior:",
              "1. Analyze changed source files and existing L2 tests.",
              "2. If L2 tests are already sufficient, comment findings and stop.",
              "3. If L2 tests are missing, generate/update tests and open a separate PR using the prompt templates below.",
              "4. Report initial CI status and document any issues found.",
              "5. Keep production-code changes minimal and justified.",
              "",
              "IMPORTANT: Create your PR on a branch named `L2/<short-description>` so the Valgrind CI workflow triggers automatically.",
              "",
              "---",
              "",
              "## Prompt Templates (pre-resolved from RDK-E prompt library)",
              "",
              "Apply the appropriate template(s) based on the coverage gaps you detect.",
              "Use the plugin name, method names, and source files from THIS repository as the inputs.",
              "",
              "### Template: Basic L2 Tests (COM-RPC and JSON-RPC)",
              "",
              prompt_text["l2_basic"],
              "",
              "### Template: Notification Handler Tests",
              "",
              prompt_text["l2_notification"],
              "",
              "### Template: Test Fixture Setup",
              "",
              prompt_text["l2_fixture"],
              "",
          ]
          body = "\n".join(lines)

          max_issue_body_chars = 60000
          body_len = len(body)
          if body_len > max_issue_body_chars:
              raise RuntimeError(
                  f"Generated issue body is too large ({body_len} chars). "
                  f"Limit is {max_issue_body_chars}. Reduce embedded prompt content."
              )

          with tempfile.NamedTemporaryFile(mode="w", delete=False, suffix=".txt") as f:
              f.write(body)
              body_file = f.name

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a") as out:
              out.write(f"title={title}\n")
              out.write(f"body_file={body_file}\n")
          PYEOF

      - name: Open Copilot issue to run custom agent
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate != 'true'
        id: open_issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          issue_url="$(gh issue create \
            --repo "$REPO" \
            --title "${{ steps.resolve_prompts.outputs.title }}" \
            --body-file "${{ steps.resolve_prompts.outputs.body_file }}")"

          echo "Created issue: $issue_url"
          echo "issue_url=$issue_url" >> "$GITHUB_OUTPUT"

      - name: Add PR linkage instructions for agent
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_URL: ${{ steps.open_issue.outputs.issue_url }}
        run: |
          set -euo pipefail

          issue_number="${ISSUE_URL##*/}"

          gh issue comment "$issue_number" \
            --repo "$REPO" \
            --body "@copilot When you open the L2 test PR, include this exact line in the PR body so CI can report Valgrind status back here: L2-Guardian-Issue: #$issue_number"

          echo "Posted linkage instruction on issue #$issue_number"
          
      - name: Assign issue to Copilot agent
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_URL: ${{ steps.open_issue.outputs.issue_url }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "COPILOT_PAT is empty. Add repo secret COPILOT_PAT with a PAT from a user who can assign Copilot agents."
            exit 1
          fi
          
          # Auto-assign to copilot using REST API with custom agent
          issue_number="${ISSUE_URL##*/}"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$REPO/issues/$issue_number/assignees" \
            --input - <<< "{
              \"assignees\": [\"copilot-swe-agent[bot]\"],
              \"agent_assignment\": {
                \"custom_agent\": \"l2-test-guardian\"
              }
            }"

          echo "Assigned issue #$issue_number to Copilot with custom agent l2-test-guardian"

      - name: Skip because issue already exists
        if: steps.evaluate.outputs.needs_agent == 'true' && steps.dedupe.outputs.duplicate == 'true'
        run: |
          echo "Skipped creating a new issue; existing issue #${{ steps.dedupe.outputs.issue_number }} is already open."
